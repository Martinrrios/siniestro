<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe de Siniestros</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-card" id="form-to-print">
    <header>
        <h2>Información del Siniestro</h2>
        <p>Complete los datos requeridos para el informe oficial.</p>
    </header>

    <div class="section-group">
        <div class="field-row">
            <div class="field"><label>Nombre y Apellido:</label><input type="text" id="chofer-nombre"></div>
            <div class="field"><label>Legajo:</label><input type="number" id="chofer-legajo"></div>
        </div>
        <div class="field-row">
            <div class="field"><label>Fecha:</label><input type="date" id="siniestro-fecha"></div>
            <div class="field"><label>Hora:</label><input type="time" id="siniestro-hora"></div>
        </div>
    </div>

    <div class="section-group">
        <div class="field">
            <label>Grupo:</label>
            <select id="grupo-select">
                <option value="">-- Seleccionar Grupo --</option>
                <option value="G200">Grupo 200</option>
                <option value="G800">Grupo 800</option>
            </select>
        </div>
        <div class="field">
            <label>Recorrido (Línea):</label>
            <input list="lineas" id="linea-input" disabled placeholder="Seleccione un grupo primero">
            <datalist id="lineas"></datalist>
        </div>
        <div class="field" id="container-ramal" style="display:none;">
            <label>Punto del Recorrido:</label>
            <select id="ramal-select"></select>
        </div>
    </div>

    <div class="section-group">
        <div class="checkbox-container">
            <input type="checkbox" id="no-mapa" onchange="toggleMapa(this.checked)">
            <label for="no-mapa">Zona Rural / No puedo identificar el lugar en el mapa</label>
        </div>
        <div id="map-container">
            <div id="map"></div>
            <div class="field-row" style="margin-top:10px;">
                <div class="field"><label>Latitud:</label><input type="text" id="lat" readonly></div>
                <div class="field"><label>Longitud:</label><input type="text" id="lng" readonly></div>
            </div>
        </div>
    </div>

    <div class="section-group">
        <div class="header-inline">
            <h3>Lesionados</h3>
            <div class="counter-controls">
                <button type="button" onclick="cambiarLesionados(-1)">-</button>
                <span id="cant-lesionados">0</span>
                <button type="button" onclick="cambiarLesionados(1)">+</button>
            </div>
        </div>
        <div id="lista-lesionados"></div>
    </div>

    <div class="section-group">
        <label>Relato del Siniestro:</label>
        <textarea id="siniestro-relato" rows="4" style="width: 100%; box-sizing: border-box;"></textarea>
    </div>

    <div class="button-group">
        <button type="button" id="btn-enviar" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
        <button type="button" id="btn-pdf" onclick="generarPDF()">Descargar PDF</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="recorridos.js"></script>
<script src="script.js"></script>
</body>
</html>
