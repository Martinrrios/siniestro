<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe de Siniestros</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-card" id="form-to-print">
    <header>
        <h2>Información del Siniestro</h2>
        <p>Complete los datos requeridos.</p>
    </header>

    <div class="section-group">
        <div class="field-row">
            <div class="field"><label>Apellido y Nombre:</label><input type="text" id="chofer-nombre"></div>
            <div class="field"><label>Legajo:</label><input type="number" id="chofer-legajo"></div>
        </div>
        <div class="field-row">
            <div class="field"><label>Fecha:</label><input type="date" id="siniestro-fecha"></div>
            <div class="field"><label>Hora:</label><input type="time" id="siniestro-hora"></div>
        </div>
	<div class="field-row">
    		<div class="field"><label>Unidad:</label><input type="number" id="unidad-numero"></div>
    		<div class="field"><label>Patente:</label><input type="text" id="unidad-patente" placeholder="ABC 123 o AF 123 CD"></div>
	</div>
    </div>

    <div class="section-group">
        <div class="field">
            <label>Grupo:</label>
            <select id="grupo-select">
                <option value="">-- Seleccionar Grupo --</option>
                <option value="G200">Grupo 200</option>
                <option value="G800">Grupo 800</option>
            </select>
        </div>
        <div class="field">
            <label>Recorrido: (RECORRIDO - GARAGE O FUERA DE SERVICIO)</label>
            <input list="lineas" id="linea-input" disabled placeholder="Seleccione un grupo primero">
            <datalist id="lineas"></datalist>
        </div>
        <div class="field" id="container-ramal" style="display:none;">
            <label>ELIJA ULTIMA ETAPA QUE PASO ANTES DEL SINIESTRO:</label>
            <select id="ramal-select"></select>
        </div>
	<div>
            <label>SELECCIONES LUGAR EXACTO DEL SINIESTRO EN EL MAPA</label>
            
        </div>
    </div>

    <div class="section-group">
        <div class="checkbox-container">
            <input type="checkbox" id="no-mapa" onchange="toggleMapa(this.checked)">
            <label for="no-mapa">NO PUEDO IDENTIFICAR SINIESTRO EN EL MAPA (ZONA RURAL)</label>
        </div>
	
        <div id="map-container">
            <div id="map"></div>
            <div class="field-row" style="margin-top:10px;">
                <div class="field"><label>Latitud:</label><input type="text" id="lat" readonly></div>
                <div class="field"><label>Longitud:</label><input type="text" id="lng" readonly></div>
            </div>
        </div>
	<div class="section-group">
    <div class="field">
        <label>Lugar del siniestro:</label>
        <input type="text" id="siniestro-direccion" placeholder="Calle principal e intersección o altura">
    </div>
    <div class="field">
        <label>Sentido de circulación:</label>
        <select id="siniestro-sentido">
            <option value="">-- Seleccionar --</option>
            <option value="Norte">Al Norte</option>
            <option value="Sur">Al Sur</option>
            <option value="Este">Al Este</option>
            <option value="Oeste">Al Oeste</option>
        </select>
    </div>
    <div class="field">
        <label>Policía que intervino y Nº de Acta:</label>
        <input type="text" id="policia-datos" placeholder="Ej. Tránsito Maipú. Nº Acta">
    </div>
</div>

<div class="section-group">
    <h3>Tercero Involucrado</h3>
    <div class="field-row">
        <div class="field"><label>Apellido y Nombre:</label><input type="text" id="tercero-nombre"></div>
        <div class="field"><label>DNI:</label><input type="number" id="tercero-dni"></div>
    </div>
    <div class="field-row">
        <div class="field"><label>Teléfono:</label><input type="tel" id="tercero-tel"></div>
        <div class="field"><label>Domicilio:</label><input type="text" id="tercero-domicilio"></div>
    </div>
    <div class="field-row">
        <div class="field"><label>Marca:</label><input type="text" id="tercero-marca"></div>
        <div class="field"><label>Modelo:</label><input type="text" id="tercero-modelo"></div>
    </div>
    <div class="field-row">
	<div class="field"><label>Patente:</label><input type="text" id="tercero-dominio"></div>
        <div class="field"><label>Seguro y Nº Póliza:</label><input type="text" id="tercero-seguro"></div>
    </div>
</div>

    </div>

    <div class="section-group">
        <div class="header-inline">
            <h3>Lesionados</h3>
            <div class="counter-controls">
                <button type="button" onclick="cambiarLesionados(-1)">-</button>
                <span id="cant-lesionados">0</span>
                <button type="button" onclick="cambiarLesionados(1)">+</button>
            </div>
        </div>
        <div id="lista-lesionados"></div>
    </div>
//
     <div class="section-group">
        <div class="header-inline">
            <h3>Testigos</h3>
            <div class="counter-controls">
                <button type="button" onclick="cambiartestigos(-1)">-</button>
                <span id="cant-testigos">0</span>
                <button type="button" onclick="cambiartestigos(1)">+</button>
            </div>
        </div>
        <div id="testigos-lista"></div>
    </div>

    <div class="section-group">
        <label>Relato del Siniestro:</label>
        <textarea id="siniestro-relato" rows="4" style="width: 100%; box-sizing: border-box;"></textarea>
    </div>

    <div class="button-group">
        <button type="button" id="btn-enviar" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
        
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="recorridos.js"></script>
<script src="script.js"></script>
</body>
</html>
