<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de Siniestros</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="form-card">
    <header>
        <h2>Información del Siniestro</h2>
        <p>Complete los datos del recorrido y marque la ubicación en el mapa.</p>
    </header>

    <div class="section-group">
        <div class="field">
            <label>Grupo:</label>
            <select id="grupo-select">
                <option value="">-- Selecciona Grupo --</option>
                <option value="G200">Grupo 200</option>
                <option value="G800">Grupo 800</option>
            </select>
        </div>

        <div class="field">
            <label>Recorrido: (Puede seleccionar zona de QUEDE o GARAGE)</label>
            <input list="lineas" id="linea-input" placeholder="Primero selecciona un grupo..." disabled onfocus="this.value=''">
            <datalist id="lineas"></datalist>
        </div>

        <div class="field" id="container-ramal" style="display: none;">
            <label>SELECCINE LA ÚLTIMA ETAPA QUE MARCÓ/PASÓ:</label>
            <select id="ramal-select">
                <option value="">-- Selecciona una opción --</option>
            </select>
        </div>
    </div> <hr>
        
    <div class="section-group">
        <label>MARCAR LUGAR DEL SINIESTRO EN EL MAPA <br><br> *POR FAVOR DEBE SER PRECISO <br> SI NO PUEDE UBICAR CORRECTAMENTE EL LUGAR POR SER UNA ZONA RURAL POR EJEMPLO SALTAR ESTE PASO</label>
        <div id="map"></div>

            <div class="results-container">
                <div class="field">
                    <label>Latitud</label>
                    <input type="text" id="lat" readonly placeholder="0.000000">
                </div>
                <div class="field">
                    <label>Longitud</label>
                    <input type="text" id="lng" readonly placeholder="0.000000">
                </div>
            </div>
        </div>
    </div>

	<div class="field">

    <button type="button" id="btn-enviar" onclick="enviarWhatsApp()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" height="20" alt="ws">
        Enviar Informe por WhatsApp
    </button>
    </div>

   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="recorridos.js"></script>

<script src="script.js"></script>

<script>
    window.onload = init;
</script>
    
</body>
</html>
